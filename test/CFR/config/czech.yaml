# Czech CFR / infection / mortality pipeline — paths relative to repository root
dataset:
  path: data/Czech/records.csv
  # Override for smoke tests: data/Czech/records_100k.csv

cohort:
  enrollment_week: "2021-24"
  followup_start: "2021-24"
  followup_end: "2022-20"

baseline:
  start: "2021-24"
  end: "2021-40"

wave:
  start: "2021-41"
  end: "2022-20"

# Enrollment ~mid-June 2021 (2021-24): strata are dose0 | dose1 | dose2 only (third dose by enrollment is negligible).
# Do not add dose3 here — run_cfr_analysis restricts to PRIMARY_ENROLLMENT_COHORTS.
cohorts:
  - dose0
  - dose1
  - dose2

# Applied to age_at_enrollment = (calendar year of enrollment_week Monday) − YearOfBirth (4-digit); not a fixed 2020 anchor.
age_bins:
  - [40, 49]
  - [50, 59]
  - [60, 69]
  - [70, 120]

cfr:
  # Episode CFR: COVID deaths from Date_COVID_death (admin/Umrti); denominator = all infection rows per week.
  # Parallel cohort×age strata (fork; Linux/WSL). 0 = all CPUs. Ignored on Windows.
  metrics_workers: 20
  # Console: after age_bin=all block, one implied-VE line per finer age_bin (wave + baseline).
  log_period_summary_ve_by_age_bin: true

filters:
  # If true: drop rows with AstraZeneca, J&J, Novavax, etc. on any of doses 1–4 (same as KCOR_ts).
  # Unvaccinated rows (empty manufacturer fields) are kept. This is Pfizer+Moderna-only for vaccinated people.
  restrict_to_pfizer_moderna: true
  # Legacy alias (same meaning): non_mrna_only: true
  # Default pipeline keeps all Infection episodes (1,2,3,…). Set true to drop Infection>1 (legacy).
  single_infection_only: false
  reinfection_sensitivity: false  # if true, forces single_infection_only off (alias)

# Backward compat: top-level reinfection_sensitivity also honored by run_cfr_analysis.py
reinfection_sensitivity: false

expected_deaths:
  reference_cohort: dose0
  vaccinated_cohort: dose2
  ve_death: 0.9
  # cfr_reference: "same_week" uses dose0 CFR that week; "baseline_mean" uses mean weekly CFR over baseline window
  cfr_reference: same_week
  # Reference CFR column on weekly_metrics (default: cfr_covid if use_covid_cfr else cfr_allcause)
  # cfr_column: cfr_covid
  # Which death type for expected COVID-death track
  use_covid_cfr: true

# Descriptive weekly share with ≥1 / ≥2 / ≥3 doses by enrollment age_bin (not a VE metric).
coverage:
  enabled: true
  save_plots: true

plots:
  save_age_stratified_ts: true
  dpi: 120
  # Grouped bars: implied VE (case rate, CFR COVID, COVID / all-cause death rate) wave vs reference cohort
  save_wave_ve_plot: true

falsification:
  younger_group_name: younger
  older_group_name: older
  age_groups:
    younger: ["40-49", "50-59", "60-69"]
    older: ["70-120"]
  split_definitions:
    - name: "70plus_vs_under70"
      younger: ["40-49", "50-59", "60-69"]
      older: ["70-120"]
    - name: "60plus_vs_under60"
      younger: ["40-49", "50-59"]
      older: ["60-69", "70-120"]
    - name: "50plus_vs_under50"
      younger: ["40-49"]
      older: ["50-59", "60-69", "70-120"]
  break_iso_week: "2021-41"
  placebo_start: "2021-30"
  placebo_end: "2021-40"
  ve_assumptions: [0.3, 0.5, 0.7, 0.9]

# Optional: Kaplan–Meier from first infection; time-since-2nd-dose weeks bins for dose2-only table
extensions:
  km_post_infection: true
  # Landmark all-cause KM from ISO week Monday (same clock as enrollment); age_bin must match an age_bins label.
  km_landmark_survival:
    enabled: true
    landmark_iso_week: "2021-24"
    age_bin: "70-120"
  time_since_dose2_weeks_bins: [[0, 4], [5, 12], [13, 999]]
  time_since_dose2_plots: true

# Console QA: infection/death totals + rates use period_of_interest only (not enrollment start).
# Cohort population_at_risk in weekly_metrics still follows cohort.followup_start–followup_end from enrollment.
qa_summary:
  period_start: "2021-40"
  period_end: "2022-20"
  # QA period table + weekly-derived rates: only YearOfBirth → birth_band_start in this range.
  period_birth_year_min: 1940
  period_birth_year_max: 1949
  spot_check:
    # Single ISO week only (not a range). Counts = that week × 1930–1939 birth cohort (birth_band_start).
    iso_week: "2021-48"
    birth_year_min: 1930
    birth_year_max: 1939
  # Weekly panel for birth slice: date, dose, alive_at_week_start, died_in_week (all-cause, enrollment follow-up).
  debug_enrollment_weekly_csv:
    enabled: true
    birth_year_min: 1930
    birth_year_max: 1939
    filename: debug_193x_enrollment_weekly.csv

output_dir: test/CFR/out
